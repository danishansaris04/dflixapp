<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFLIX - Premium Streaming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #7000ff;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--glass) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .container {
            padding: 40px 20px;
            width: 100%;
            max-width: 450px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .brand {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }

        .hero-desc {
            color: #888;
            font-size: 1rem;
            margin-top: 8px;
            font-weight: 400;
        }

        .app-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 25px;
            backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Highlight effect for Player */
        .card-highlight {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(112, 0, 255, 0.15);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 20px;
        }

        .dl-btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .movie-btn {
            background: #fff;
            color: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .player-btn {
            background: var(--glass);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .connector {
            text-align: center;
            font-size: 1.2rem;
            color: #333;
            margin: -5px 0;
        }

        /* Animated Progress Bar */
        .loader-bar {
            height: 6px;
            background: rgba(255,255,255,0.05);
            margin-top: 20px;
            border-radius: 10px;
            display: none;
            overflow: hidden;
        }

        .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.1s linear;
        }

        .status-msg {
            font-size: 0.75rem;
            margin-top: 10px;
            color: var(--primary);
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .trust-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            opacity: 0.4;
            font-size: 0.75rem;
            font-weight: 700;
        }

        /* Pulse animation for Player App */
        @keyframes pulse {
            0% { transform: scale(1); border-color: var(--accent); }
            50% { transform: scale(1.02); border-color: var(--primary); }
            100% { transform: scale(1); border-color: var(--accent); }
        }
        .pulse-active { animation: pulse 2s infinite ease-in-out; }

    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="container">
    <header>
        <div class="brand">DFLIX</div>
        <p class="hero-desc">Watch & Download in Ultra HD</p>
    </header>

    <div class="app-stack">
        <div class="card">
            <div class="card-title">🎬 DFLIX Movie</div>
            <p class="card-desc">Unlimited movies and series..</p>
            <button class="dl-btn movie-btn" onclick="startDL('movie', 'https://dflixapp.netlify.app/DFlix.apk')">Get Movie App</button>
            <div id="movie-loader" class="loader-bar"><div id="movie-fill" class="fill"></div></div>
            <div id="movie-status" class="status-msg"></div>
        </div>

        <div class="connector">✦</div>

        <div class="card" id="player-card">
            <div class="card-title">⚡ DFLIX Player</div>
            <p class="card-desc">Required for 4K streaming and high-quality audio.</p>
            <button class="dl-btn player-btn" onclick="startDL('player', 'https://dflixapp.netlify.app/DFlixPlayer.apk')">Get Player Pro</button>
            <div id="player-loader" class="loader-bar"><div id="player-fill" class="fill"></div></div>
            <div id="player-status" class="status-msg"></div>
        </div>
    </div>

    <div class="trust-row">
        <span>VIRUS FREE</span>
        <span>•</span>
        <span>4K SUPPORT</span>
        <span>•</span>
        <span>SECURE</span>
    </div>
</div>

<script>
    function startDL(type, url) {
        const btn = event.target;
        const loader = document.getElementById(type + '-loader');
        const fill = document.getElementById(type + '-fill');
        const status = document.getElementById(type + '-status');
        
        // UI Interaction
        btn.disabled = true;
        btn.style.opacity = '0.4';
        btn.innerText = "Securing Link...";
        loader.style.display = 'block';
        status.style.display = 'block';

        let w = 0;
        const interval = setInterval(() => {
            if(w >= 100) {
                clearInterval(interval);
                btn.innerText = "Started!";
                status.innerText = "Download beginning now...";
                
                // Real Download Trigger
                window.location.href = url;

                if(type === 'movie') {
                    // Alert and Pulse Player Card
                    document.getElementById('player-card').classList.add('pulse-active');
                    setTimeout(() => {
                        alert("Bhai, Movie App ke sath Player install karna zaroori hai, tabhi movie chalegi!");
                    }, 1000);
                }
            } else {
                w += 2;
                fill.style.width = w + '%';
                if(w == 40) status.innerText = "Optimizing for mobile...";
                if(w == 80) status.innerText = "Ready to download...";
            }
        }, 30); // Fast animation for smooth feel
    }
</script>

</body>
</html>
